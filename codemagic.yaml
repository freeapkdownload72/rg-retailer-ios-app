workflows:
  ios-capacitor-app-store:
    name: iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStore Connect
    environment:
      node: v22.15.0
      xcode: latest
      vars:
        BUNDLE_ID: "com.rgretailer.companion"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node.js dependencies
        script: |
          # Remove Windows-generated lockfile for clean macOS install
          rm -f package-lock.json
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor project (SPM)
        script: |
          npx cap sync ios
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files from Apple
        script: |
          # Generate a private key for certificate creation/matching
          openssl genrsa 2048 > /tmp/cert_key.pem
          # Fetch or create distribution certificate and provisioning profile
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=/tmp/cert_key.pem
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply code signing profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
