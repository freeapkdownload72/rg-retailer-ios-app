workflows:
  ios-capacitor-app-store:
    name: iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStore Connect
    environment:
      node: v22.15.0
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.rgretailer.companion"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node.js dependencies
        script: |
          # Remove Windows-generated lockfile for clean macOS install
          rm -f package-lock.json
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor project (SPM)
        script: |
          npx cap sync ios
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files from Apple
        script: |
          # Generate a private key inline for certificate creation
          export CERTIFICATE_PRIVATE_KEY="$(openssl genrsa 2048 2>/dev/null)"
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply code signing profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to App Store Connect
        script: |
          # Use xcrun altool to upload to App Store Connect
          xcrun altool --upload-app \
            -f build/ios/ipa/App.ipa \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - rajatgrover971@gmail.com
        notify:
          success: true
          failure: true
